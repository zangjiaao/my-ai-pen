services:
  node3:
    build:
      context: ..
      dockerfile: node3/Dockerfile
    env_file:
      - .env
    environment:
      PLATFORM_WS_URL: ${PLATFORM_WS_URL:-ws://host.docker.internal:8000/ws}
      STRIX_PROJECT_DIR: /workspace/node3/workspace/strix_runtime
      PYTHONPATH: /workspace/node3
    volumes:
      - ./workspace:/workspace/node3/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - strix-uv-cache:/root/.cache/uv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace
    command: ["python", "/workspace/node3/main.py"]

volumes:
  strix-uv-cache:
