# Build and push unified pentest sandbox to Docker Hub.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username (also used as image namespace)
#   DOCKERHUB_TOKEN     — Docker Hub access token (not account password)
#
# Image: docker.io/<DOCKERHUB_USERNAME>/pen-sandbox
# Tags:  latest, dev, v<VERSION>, <git-sha>, <VERSION>

name: pen-sandbox

on:
  push:
    branches: [main]
    paths:
      - "sandbox/pen-sandbox/**"
      - ".github/workflows/pen-sandbox.yml"
  pull_request:
    paths:
      - "sandbox/pen-sandbox/**"
      - ".github/workflows/pen-sandbox.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: pen-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          V=$(tr -d '[:space:]' < sandbox/pen-sandbox/VERSION)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Pen-sandbox VERSION=$V"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=v${{ steps.ver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: sandbox/pen-sandbox
          file: sandbox/pen-sandbox/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds rebuilds of apt/npm layers
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Kali + nuclei templates + Chrome download needs headroom
          provenance: false

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### pen-sandbox pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pen-sandbox:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Node4: \`export PEN_SANDBOX_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/pen-sandbox:latest\`" >> "$GITHUB_STEP_SUMMARY"
